<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#7c2d12"/>

  <!-- Glass clip region -->
  <defs>
    <clipPath id="glass-clip">
      <polygon points="144,116 368,116 334,396 178,396"/>
    </clipPath>
  </defs>

  <!-- Amber liquid fill (clipped to glass shape) -->
  <rect x="80" y="248" width="400" height="200" clip-path="url(#glass-clip)" fill="#f59e0b" opacity="0.82"/>

  <!-- Subtle liquid surface highlight -->
  <rect x="80" y="248" width="400" height="10" clip-path="url(#glass-clip)" fill="#fde68a" opacity="0.5"/>

  <!-- Glass walls -->
  <polygon
    points="144,116 368,116 334,396 178,396"
    fill="none"
    stroke="rgba(255,255,255,0.92)"
    stroke-width="16"
    stroke-linejoin="round"
  />

  <!-- Rim bar -->
  <line x1="144" y1="116" x2="368" y2="116" stroke="white" stroke-width="22" stroke-linecap="round"/>

  <!-- Glass shine (left side highlight) -->
  <line x1="172" y1="145" x2="193" y2="368" stroke="rgba(255,255,255,0.14)" stroke-width="22" stroke-linecap="round"/>
</svg>
